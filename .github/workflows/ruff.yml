name: Ruff

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  ruff-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        shell: bash
        run: |
          set -eux
          uv sync --frozen --group dev

      - name: Lint with ruff (Linter & isort)
        shell: bash
        run: |
          set -eux
          uv run ruff check qamomile/ tests/

      - name: Check formatting with ruff (Formatter)
        shell: bash
        run: |
          set -eux
          uv run ruff format --check qamomile/ tests/