name: Zuban

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.changes.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect docs-only changes
        id: changes
        shell: bash
        run: |
          .github/scripts/detect-docs-only.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"

  zuban-check:
    needs: changes
    if: ${{ needs.changes.outputs.docs_only != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        shell: bash
        run: |
          set -eux
          uv sync --frozen --group dev

      - name: Type check with zuban
        shell: bash
        run: |
          set -eux
          uv run zuban check qamomile/
          # docs/ is type-clean in this PR (see the docs-side fixes
          # already landed), but the CI gate is intentionally limited
          # to qamomile/ for now so future docs edits don't accidentally
          # break the type-check job. Re-enable by switching the line
          # above to ``uv run zuban check qamomile/ docs/`` once the
          # docs-side discipline is established.
