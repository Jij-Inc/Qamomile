name: Python Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  Python-Test:
    if: ${{ !contains(github.head_ref, 'dependabot/github_actions') }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      # --frozen ensures exact versions from uv.lock are used (CI best practice).
      # Install the CUDA-Q extra through uv sync so dependency resolution stays unified.
      - name: Install dependencies
        shell: bash
        run: |
          set -eux
          uv sync --frozen --all-extras
      - name: Run unit tests
        shell: bash
        run: |
          set -eux
          uv run pytest tests -v
      - name: Run docs tests
        shell: bash
        run: |
          set -eux
          uv run pytest -m docs tests/docs -v
