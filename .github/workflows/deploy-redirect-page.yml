# Workflow for deploying the RTD redirect page to GitHub Pages
name: Deploy GitHub Pages redirect

on:
  push:
    branches: ["main"]
    paths:
      - "docs/github_page/**"
      - ".github/workflows/deploy-redirect-page.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload only the redirect directory
          path: 'docs/github_page'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
